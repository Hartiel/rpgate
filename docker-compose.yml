services:
  backend:
    build: ./backend
    container_name: rpgate_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: rpgate_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "80:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    stdin_open: true
    tty: true

  db:
    image: postgres:16-alpine
    container_name: rpgate_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: